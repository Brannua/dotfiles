[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = [ "g", "c" ]
run  = "cd ~/Github/dotfiles/"
desc = "Go dotfiles/"

[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "cd ~/Downloads/"
desc = "Go Downloads/"

[[mgr.prepend_keymap]]
on   = [ "g", "v" ]
run  = "cd ~/Videos/"
desc = "Go Videos/"

[[mgr.prepend_keymap]]
on   = [ "g", "m" ]
run  = "cd ~/Music/"
desc = "Go Music/"

[[mgr.prepend_keymap]]
on   = [ "g", "p" ]
run  = "cd ~/Pictures/"
desc = "Go Pictures/"
